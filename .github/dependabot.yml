version: 2

multi-ecosystem-groups:
  default:
    schedule:
      interval: every day at 7am

updates:
- package-ecosystem: github-actions
  directory: /
  patterns:
  - '*'
  groups:
    github-actions:
      patterns:
      - '*'
  cooldown:
    default-days: 7
  multi-ecosystem-group: default

- package-ecosystem: pip
  directory: /
  patterns:
  - '*'
  groups:
    pip:
      patterns:
      - '*'
  cooldown:
    default-days: 7
  multi-ecosystem-group: default
