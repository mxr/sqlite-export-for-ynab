repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
  hooks:
  - id: check-docstring-first
  - id: debug-statements
  - id: end-of-file-fixer
  - id: trailing-whitespace
- repo: https://github.com/macisamuele/language-formatters-pre-commit-hooks
  rev: 4380fbb73a154b5f5624794c1c78d9719ccc860f  # frozen: v2.16.0
  hooks:
  - id: pretty-format-toml
    args: [--autofix, --trailing-commas]
  - id: pretty-format-yaml
    args: [--autofix]
- repo: https://github.com/asottile/reorder-python-imports
  rev: 5e38415c12154247a099c7023c210e3d458275b5  # frozen: v3.17.0
  hooks:
  - id: reorder-python-imports
    args: [--py312-plus, --add-import, from __future__ import annotations]
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: 2700fd5671c633760d912769c041bfcde2b9a01b  # frozen: v0.15.22
  hooks:
  - id: ruff-check
    args: [--fix]
  - id: ruff-format
- repo: https://github.com/sqlfluff/sqlfluff
  rev: 1c2ec52808fdc09efa1552437ec9d140749f98d0  # frozen: 4.2.2
  hooks:
  - id: sqlfluff-fix
    args: [--dialect, sqlite]
- repo: https://github.com/adamtheturtle/doccmd-pre-commit
  rev: 6531338d501c86cf5f0803ba6e2c3a2a858a63c5  # frozen: v2026.3.26.2
  hooks:
  - id: doccmd
    name: doccmd-sqlfluff
    args: [--no-pad-file, --language, sql, --command, sqlfluff fix --dialect sqlite]
    additional_dependencies: [sqlfluff]
- repo: https://github.com/pre-commit/mirrors-mypy
  rev: 41e691678310dfd3833f7ab4e180ddb014310356  # frozen: v2.3.0
  hooks:
  - id: mypy
    additional_dependencies:
    - aiohttp>=3
    - aiopathlib
    - aiosqlite
    - asyncio-for-ynab~=1.86.0
    - coverage
    - fasteners
    - pytest
    - pytest-asyncio
    - rich>=10
    - setuptools
    - tenacity
    language_version: python3.12
- repo: https://github.com/mxr/mirrors-ty
  rev: febed8a7b2665e80a9d3855c59ac716a6284d628  # frozen: v0.0.61
  hooks:
  - id: ty
    additional_dependencies:
    - aiohttp>=3
    - aiopathlib
    - aiosqlite
    - asyncio-for-ynab~=1.86.0
    - coverage
    - fasteners
    - pytest
    - pytest-asyncio
    - rich>=10
    - setuptools
    - tenacity
- repo: https://github.com/mxr/sync-typing-deps
  rev: c2ec0c01a31703615c17e3fe11d1fe28c003f1d8  # frozen: v0.5.3
  hooks:
  - id: sync-typing-deps
- repo: https://github.com/zizmorcore/zizmor-pre-commit
  rev: 64a97fb7fa63188393d3215c6e312f5f9c6d0f78  # frozen: v1.27.0
  hooks:
  - id: zizmor
    args: [--no-progress, --fix]
- repo: https://github.com/rhysd/actionlint
  rev: 914e7df21a07ef503a81201c76d2b11c789d3fca  # frozen: v1.7.12
  hooks:
  - id: actionlint
    additional_dependencies:
    - github.com/wasilibs/go-shellcheck/cmd/shellcheck@latest
