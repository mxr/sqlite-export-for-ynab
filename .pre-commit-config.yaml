repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
  hooks:
  - id: check-docstring-first
  - id: debug-statements
  - id: end-of-file-fixer
  - id: trailing-whitespace
- repo: https://github.com/macisamuele/language-formatters-pre-commit-hooks
  rev: 4380fbb73a154b5f5624794c1c78d9719ccc860f  # frozen: v2.16.0
  hooks:
  - id: pretty-format-toml
    args: [--autofix, --trailing-commas]
  - id: pretty-format-yaml
    args: [--autofix]
- repo: https://github.com/asottile/reorder-python-imports
  rev: 7885866bd38c852b5e042c4aeef0285d715ffeee  # frozen: v3.16.0
  hooks:
  - id: reorder-python-imports
    args: [--py312-plus, --add-import, from __future__ import annotations]
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: c59bba8fb259db0fec2bbb77ad8ba51ea7341b56  # frozen: v0.15.20
  hooks:
  - id: ruff-check
    args: [--fix]
  - id: ruff-format
- repo: https://github.com/sqlfluff/sqlfluff
  rev: 1c2ec52808fdc09efa1552437ec9d140749f98d0  # frozen: 4.2.2
  hooks:
  - id: sqlfluff-fix
    args: [--dialect, sqlite]
- repo: https://github.com/adamtheturtle/doccmd-pre-commit
  rev: 6531338d501c86cf5f0803ba6e2c3a2a858a63c5  # frozen: v2026.3.26.2
  hooks:
  - id: doccmd
    name: doccmd-sqlfluff
    args: [--no-pad-file, --language, sql, --command, sqlfluff fix --dialect sqlite]
    additional_dependencies: [sqlfluff]
- repo: https://github.com/pre-commit/mirrors-mypy
  rev: d2823d321df3af8f878f7ee3414dc94d037145b9  # frozen: v2.1.0
  hooks:
  - id: mypy
    additional_dependencies:
    - aiohttp>=3
    - aiopathlib
    - aiosqlite
    - asyncio-for-ynab~=1.85.0
    - coverage
    - fasteners
    - pytest
    - pytest-asyncio
    - rich>=10
    - setuptools
    - tenacity
    language_version: python3.12
- repo: https://github.com/mxr/mirrors-ty
  rev: 009c8adeffbab5aa73005612dd5a7fd9b825eee5  # frozen: v0.0.55
  hooks:
  - id: ty
    additional_dependencies:
    - aiohttp>=3
    - aiopathlib
    - aiosqlite
    - asyncio-for-ynab~=1.85.0
    - coverage
    - fasteners
    - pytest
    - pytest-asyncio
    - rich>=10
    - setuptools
    - tenacity
- repo: https://github.com/mxr/sync-typing-deps
  rev: 15d110e7034a52d6a141f23e436e31156d4f9959  # frozen: v0.5.2
  hooks:
  - id: sync-typing-deps
- repo: https://github.com/zizmorcore/zizmor-pre-commit
  rev: e3eebf65325ccc992422292cb7a4baee967cf815  # frozen: v1.26.1
  hooks:
  - id: zizmor
    args: [--no-progress, --fix]
